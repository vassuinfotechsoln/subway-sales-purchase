name: Deploy ERP to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/subway-sales-purchase
            git fetch origin main
            git reset --hard origin/main
            echo "--- DEPLOYING COMMIT ---"
            git log -1 --oneline
            echo "------------------------"

            echo "Cleaning up old containers..."
            docker stop subway-app || true
            docker rm subway-app || true
            # Also stop any other containers using the same image
            docker ps -a -q --filter ancestor=subway-app | xargs docker stop || true
            docker ps -a -q --filter ancestor=subway-app | xargs docker rm || true

            echo "Building new image..."
            docker build --no-cache -t subway-app .

            echo "Starting container..."
            # Mapping port 5173 just in case, but also 80 if the proxy expects it (optional, depends on VPS)
            docker run -d -p 5173:4173 --name subway-app subway-app
            
            echo "--- DEPLOYMENT REPORT ---"
            docker ps -a
            echo "Container Status:"
            docker inspect --format='{{.State.Status}}' subway-app
            echo "--------------------------"